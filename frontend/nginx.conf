server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the backend container on the shared Docker network.
    # "resume-analyzer" matches the service name in docker-compose.yml.
    location /api/ {
        proxy_pass http://resume-analyzer:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # local LLM responses can be slow
        proxy_send_timeout 300s;
        client_max_body_size 20M;  # allow reasonably large resume uploads
    }
}
